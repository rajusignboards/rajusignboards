<div class="app-root app-shell">
  <app-site-header [currentPage]="currentPage()" (pageChange)="showPage($event)" />

  <section id="home" class="page-anchor">
    <app-home-page (pageChange)="showPage($event)" />
  </section>

  <section id="services" class="page-anchor">
    <app-services-page (pageChange)="showPage($event)" />
  </section>

  <section id="journey" class="page-anchor">
    <app-journey-page />
  </section>

  <section id="gallery" class="page-anchor">
    <app-gallery-page />
  </section>

  <section id="contact" class="page-anchor">
    <app-contact-page (pageChange)="showPage($event)" />
  </section>
</div>
