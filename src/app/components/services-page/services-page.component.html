<section class="page-section">
  <section class="page-hero page-hero-centered">
    <div class="sec-label">What We Offer</div>
    <h1 class="sec-title services-title">All Our Signage Services</h1>
    <p class="sec-sub services-sub">
      Manufactured in-house at our Karimnagar workshop with quality materials and experienced
      craftsmen.
    </p>
  </section>

  <section class="section section-services">
    <div class="services-grid">
      @for (service of services; track service.title) {
        <article class="svc-card">
          <div class="svc-icon" [innerHTML]="service.icon"></div>
          <h3 class="svc-card-title">{{ service.title }}</h3>
          <p class="svc-card-copy">{{ service.description }}</p>
        </article>
      }
    </div>
    <div class="section-cta">
      <button
        class="btn-primary nav-button-reset"
        type="button"
        (click)="pageChange.emit('contact')"
      >
        Get a Free Quote &#8594;
      </button>
    </div>
  </section>
</section>
