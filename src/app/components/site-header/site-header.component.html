<nav class="site-nav">
  <button class="nav-logo nav-button-reset" type="button" (click)="navigate('home')">
    <img class="logo-img" src="logo.png" alt="Raju Sign Boards" />
    <span class="nav-logo-text"><span class="nav-logo-accent">Raju</span> Sign Boards</span>
  </button>

  <ul class="nav-links nav-list-reset">
    @for (item of navItems; track item.id) {
      <li class="nav-item">
        <button
          class="nav-link-button nav-button-reset"
          type="button"
          [class.active]="item.id === currentPage"
          (click)="navigate(item.id)"
        >
          {{ item.label }}
        </button>
      </li>
    }
  </ul>

  <div class="nav-right">
    <button class="nav-cta nav-button-reset" type="button" (click)="navigate('contact')">
      Get a Quote
    </button>
    <button
      class="hamburger nav-button-reset"
      type="button"
      [attr.aria-expanded]="menuOpen()"
      aria-label="Toggle menu"
      (click)="toggleMenu()"
    >
      <span class="ham-bar"></span>
      <span class="ham-bar"></span>
      <span class="ham-bar"></span>
    </button>
  </div>
</nav>

@if (menuOpen()) {
  <div class="mobile-menu">
    @for (item of navItems; track item.id) {
      <button
        class="mobile-nav-btn nav-button-reset"
        type="button"
        [class.active]="item.id === currentPage"
        (click)="navigate(item.id)"
      >
        {{ item.label }}
      </button>
    }
    <button class="mobile-cta nav-button-reset" type="button" (click)="navigate('contact')">
      Get a Free Quote
    </button>
  </div>
}
